name: Migrate Klinge PostgreSQL

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Escribe MIGRATE para ejecutar la migración de Klinge"
        required: true
        default: "MIGRATE"
      mode:
        description: "endpoint usa la BD configurada en Railway; direct usa URLs como GitHub Secrets"
        required: true
        default: "endpoint"
        type: choice
        options:
          - endpoint
          - direct
      klinge_base_url:
        description: "URL pública de Klinge en Railway. Si queda vacío usa variable KLINGE_BASE_URL"
        required: false
        default: ""
      admin_key:
        description: "ADMIN_API_KEY si el endpoint está protegido. Opcional. No se imprime."
        required: false
        default: ""

jobs:
  migrate-via-endpoint:
    if: ${{ github.event.inputs.confirm == 'MIGRATE' && github.event.inputs.mode == 'endpoint' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      KLINGE_BASE_URL_INPUT: ${{ github.event.inputs.klinge_base_url }}
      KLINGE_BASE_URL_VAR: ${{ vars.KLINGE_BASE_URL }}
      KLINGE_ADMIN_KEY_INPUT: ${{ github.event.inputs.admin_key }}
      KLINGE_ADMIN_KEY_VAR: ${{ secrets.ADMIN_API_KEY }}

    steps:
      - name: Resolve Klinge base URL
        run: |
          BASE_URL="$KLINGE_BASE_URL_INPUT"

          if [ -z "$BASE_URL" ]; then
            BASE_URL="$KLINGE_BASE_URL_VAR"
          fi

          if [ -z "$BASE_URL" ]; then
            echo "klinge_base_url is required when mode=endpoint. Add it when running the workflow or create GitHub variable KLINGE_BASE_URL."
            exit 1
          fi

          BASE_URL="${BASE_URL%/}"
          echo "BASE_URL=$BASE_URL" >> "$GITHUB_ENV"

          ADMIN_KEY="$KLINGE_ADMIN_KEY_INPUT"

          if [ -z "$ADMIN_KEY" ]; then
            ADMIN_KEY="$KLINGE_ADMIN_KEY_VAR"
          fi

          echo "::add-mask::$ADMIN_KEY"
          echo "ADMIN_KEY=$ADMIN_KEY" >> "$GITHUB_ENV"

      - name: Check Klinge PostgreSQL health
        run: |
          if [ -n "$ADMIN_KEY" ]; then
            curl -fsS "$BASE_URL/debug/klinge-db/health?admin_key=$ADMIN_KEY" | tee health.json
          else
            curl -fsS "$BASE_URL/debug/klinge-db/health" | tee health.json
          fi

          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('health.json','utf8')); if(!data.ok){ console.error(data); process.exit(1); } console.log('Health OK:', data);"

      - name: Run migration through deployed Klinge endpoint
        run: |
          if [ -n "$ADMIN_KEY" ]; then
            curl -fsS -X POST "$BASE_URL/debug/klinge-db/migrate-from-supabase?admin_key=$ADMIN_KEY" | tee migrate.json
          else
            curl -fsS -X POST "$BASE_URL/debug/klinge-db/migrate-from-supabase" | tee migrate.json
          fi

          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('migrate.json','utf8')); if(!data.ok){ console.error(data); process.exit(1); } console.log('Migration OK:', data);"

      - name: Verify migrated schema through Klinge
        run: |
          if [ -n "$ADMIN_KEY" ]; then
            curl -fsS "$BASE_URL/debug/klinge-db/counts?admin_key=$ADMIN_KEY" | tee counts.json
          else
            curl -fsS "$BASE_URL/debug/klinge-db/counts" | tee counts.json
          fi

          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('counts.json','utf8')); if(!data.ok){ console.error(data); process.exit(1); } console.log('Counts OK:', data);"

  migrate-direct:
    if: ${{ github.event.inputs.confirm == 'MIGRATE' && github.event.inputs.mode == 'direct' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
      RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
      PGSSLMODE: require

    steps:
      - name: Validate required secrets
        run: |
          if [ -z "$SUPABASE_DATABASE_URL" ]; then
            echo "SUPABASE_DATABASE_URL secret is missing."
            exit 1
          fi

          if [ -z "$RAILWAY_DATABASE_URL" ]; then
            echo "RAILWAY_DATABASE_URL secret is missing."
            exit 1
          fi

          echo "Secrets OK"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Backup Supabase public schema
        run: |
          pg_dump "$SUPABASE_DATABASE_URL" \
            --schema=public \
            --format=custom \
            --no-owner \
            --no-acl \
            --file=klinge_supabase.dump

      - name: Clean Railway PostgreSQL public schema
        run: |
          psql "$RAILWAY_DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          drop schema if exists public cascade;
          create schema public;
          grant all on schema public to public;
          SQL

      - name: Restore Supabase backup into Railway PostgreSQL
        run: |
          pg_restore \
            --dbname="$RAILWAY_DATABASE_URL" \
            --no-owner \
            --no-acl \
            --clean \
            --if-exists \
            klinge_supabase.dump

      - name: Validate migrated tables and counts
        run: |
          psql "$RAILWAY_DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          select table_name
          from information_schema.tables
          where table_schema = 'public'
          order by table_name;

          select count(*) as ventas from ventas;
          select count(*) as clientes from clientes;
          select count(*) as user_pins from user_pins;
          select count(*) as user_permissions from user_permissions;
          select count(*) as vendedores from vendedores;
          SQL
